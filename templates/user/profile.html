{% extends "base.html" %}
{% block sidebar %}
<ul class="nav flex-column px-2">
  <li class="nav-item"><a class="nav-link" href="{{ url_for('user_dashboard') }}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
  <li class="nav-item"><a class="nav-link" href="{{ url_for('user_treks') }}"><i class="bi bi-map"></i> Browse Treks</a></li>
  <li class="nav-item"><a class="nav-link active" href="{{ url_for('user_profile') }}"><i class="bi bi-person"></i> Profile</a></li>
</ul>
{% endblock %}
{% block content %}
<h4 class="mb-3">My Profile</h4>
<div class="card p-4" style="max-width:450px">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ user.email }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" value="{{ user.username }}" disabled>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
